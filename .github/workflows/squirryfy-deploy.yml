name: Squirryfy Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_server_ip:
        description: 'Target Server IP (optional override)'
        required: false
        type: string

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/squirryfy-signaldiscovery-engine:latest
            ghcr.io/${{ github.repository_owner }}/squirryfy-signaldiscovery-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Deploy Script on Target Server
        env:
          SERVER_IP: ${{ inputs.target_server_ip || secrets.SERVER_IP }}
          REPO_OWNER: ${{ github.repository_owner }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SQUIRRY_API_URL: ${{ secrets.SQUIRRY_API_URL }}
          SQUIRRY_API_KEY: ${{ secrets.SQUIRRY_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEFAULT_GEMINI_MODEL: ${{ secrets.DEFAULT_GEMINI_MODEL || 'gemini-1.5-flash' }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SERVER_IP" ]; then
            echo "::error::Target SERVER_IP is not set. Please run the Terraform workflow or define secrets.SERVER_IP."
            exit 1
          fi

          echo "Deploying to server: $SERVER_IP..."
          
          # Connect via SSH, write environment variables, pull latest image, and run container
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@$SERVER_IP "
            echo 'Updating /etc/squirryfy.env with deployment variables...' && \
            mkdir -p /etc && \
            echo 'SUPABASE_URL=$SUPABASE_URL' > /etc/squirryfy.env && \
            echo 'SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY' >> /etc/squirryfy.env && \
            echo 'GEMINI_API_KEY=$GEMINI_API_KEY' >> /etc/squirryfy.env && \
            echo 'DEFAULT_GEMINI_MODEL=$DEFAULT_GEMINI_MODEL' >> /etc/squirryfy.env && \
            echo 'SQUIRRY_API_URL=$SQUIRRY_API_URL' >> /etc/squirryfy.env && \
            echo 'SQUIRRY_API_KEY=$SQUIRRY_API_KEY' >> /etc/squirryfy.env && \
            echo 'JWT_SECRET=$JWT_SECRET' >> /etc/squirryfy.env && \
            echo 'INSTAGRAM_BUSINESS_ACCOUNT_ID=$INSTAGRAM_BUSINESS_ACCOUNT_ID' >> /etc/squirryfy.env && \
            echo 'META_PAGE_ACCESS_TOKEN=$META_PAGE_ACCESS_TOKEN' >> /etc/squirryfy.env && \
            echo 'Logging in to GHCR on server...' && \
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} && \
            echo 'Pulling latest image...' && \
            docker pull ghcr.io/${REPO_OWNER}/squirryfy-signaldiscovery-engine:latest && \
            echo 'Stopping existing container...' && \
            docker stop squirryfy || true && \
            docker rm squirryfy || true && \
            echo 'Running new container...' && \
            docker run -d \
              --name squirryfy \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              --env-file /etc/squirryfy.env \
              ghcr.io/${REPO_OWNER}/squirryfy-signaldiscovery-engine:latest && \
            echo 'Updating Caddy configuration...' && \
            mkdir -p /etc/caddy && \
            echo 'squirryfy.com, www.squirryfy.com, squirrify.com, www.squirrify.com {' > /etc/caddy/Caddyfile && \
            echo '    reverse_proxy 127.0.0.1:3000' >> /etc/caddy/Caddyfile && \
            echo '}' >> /etc/caddy/Caddyfile && \
            echo 'Restarting Caddy...' && \
            docker stop caddy || true && \
            docker rm caddy || true && \
            docker run -d --name caddy --restart unless-stopped --network host -v /etc/caddy/Caddyfile:/etc/caddy/Caddyfile -v caddy_data:/data -v caddy_config:/config caddy && \
            echo 'Pruning unused docker elements...' && \
            docker image prune -f && \
            echo '✅ Deployment completed successfully!'
          "
